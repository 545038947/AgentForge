# MCP Server 配置
# 参考: https://modelcontextprotocol.io

servers:
  # Bing 中文搜索 MCP Server
  bing-search:
    transport: stdio
    command: cmd
    args:
      - "/c"
      - "npx"
      - "-y"
      - "bing-cn-mcp"
    enabled: true

